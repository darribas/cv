name: Build CV site

# Rebuilds docs/ (cv.pdf, index.html, style.css, fonts/) whenever the data or
# either renderer changes, and commits the result back on pushes to main. On
# pull requests it only builds (no commit) so a broken source is caught
# before merge. See ARCHITECTURE.md for why this needs nothing beyond the
# Typst binary and stdlib Python — no TeXLive, no system fonts (TeX Gyre
# Pagella is bundled in fonts/), no extra Python packages.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "fonts/**"
      - "Makefile"
      - ".github/workflows/build-site.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "fonts/**"
      - "Makefile"
      - ".github/workflows/build-site.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst (latest release)
        run: |
          curl -fsSL "https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz" \
            | tar xJ
          sudo mv "typst-x86_64-unknown-linux-musl/typst" /usr/local/bin/typst
          echo "### Typst version" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          typst --version | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Validate JSON
        run: make validate

      - name: Build site
        # A fresh checkout's file mtimes don't reflect commit history, so
        # make's timestamp check can't be trusted to detect "source changed" —
        # force the rebuild rather than risk silently reusing stale output.
        run: |
          rm -f docs/cv.pdf docs/index.html docs/style.css
          rm -rf docs/fonts
          make site

      - name: Commit rebuilt site
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Rebuild CV site [skip ci]"
          git push
